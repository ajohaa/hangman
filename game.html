<!doctype html>
<html lang="en">
  <head>
    <title>hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container game-container">
      <!-- TOP BAR -->
      <div class="row align-items-center mb-3">
        <div class="col-12 col-md-6">
          <h1>Hangman Game</h1>
        </div>
        <div class="col-12 col-md-6">
          <div class="row g-2 justify-content-md-end">
            <div class="col-auto">
              <a href="index.html">
                <button class="icon-btn">🏠 Home</button>
              </a>
            </div>
            <div class="col-auto">
              <button class="icon-btn" id="restart-btn">🔄 Restart</button>
            </div>
          </div>
        </div>
      </div>

      <!-- LIVES -->
      <div class="lives" id="lives">
        Lives:
      </div>

      <div class="row g-4">
        <!-- HANGMAN AREA -->
        <div class="col-12 col-md-4 text-center">
          <div class="row g-3">
            <div class="col-12">
              <div class="hangman-box">
                <!-- JS will draw hangman here -->
              </div>
            </div>

            <div class="col-12">
              <button class="hint-btn">💡 Hint</button>
            </div>
          </div>
        </div>

        <!-- GAME AREA -->
        <div class="col-12 col-md-8">
          <div class="category">
            Category: <span id="category-name">Animals</span>
          </div>

          <div class="word row row-cols-auto g-3" id="word">
            <!-- JS will display the word here -->
          </div>

          <!-- KEYBOARD -->
          <div class="keyboard">
            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col"><button class="key">A</button></div>
              <div class="col key-col"><button class="key">B</button></div>
              <div class="col key-col"><button class="key">C</button></div>
              <div class="col key-col"><button class="key">D</button></div>
              <div class="col key-col"><button class="key">E</button></div>
              <div class="col key-col"><button class="key">F</button></div>
              <div class="col key-col"><button class="key">G</button></div>
            </div>

            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col"><button class="key">H</button></div>
              <div class="col key-col"><button class="key">I</button></div>
              <div class="col key-col"><button class="key">J</button></div>
              <div class="col key-col"><button class="key">K</button></div>
              <div class="col key-col"><button class="key">L</button></div>
              <div class="col key-col"><button class="key">M</button></div>
              <div class="col key-col"><button class="key">N</button></div>
            </div>

            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col"><button class="key">O</button></div>
              <div class="col key-col"><button class="key">P</button></div>
              <div class="col key-col"><button class="key">Q</button></div>
              <div class="col key-col"><button class="key">R</button></div>
              <div class="col key-col"><button class="key">S</button></div>
              <div class="col key-col"><button class="key">T</button></div>
              <div class="col key-col"><button class="key">U</button></div>
            </div>

            <div class="row g-2 keyboard-row justify-content-center">
              <div class="col key-col"><button class="key">V</button></div>
              <div class="col key-col"><button class="key">W</button></div>
              <div class="col key-col"><button class="key">X</button></div>
              <div class="col key-col"><button class="key">Y</button></div>
              <div class="col key-col"><button class="key">Z</button></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="scripts.js"></script>
  </body>
</html>
