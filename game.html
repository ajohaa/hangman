<!doctype html>
<html lang="en">
  <head>
    <title>hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/iou1vnd.css">
  </head>

  <body>

    <div class="game-modal">
      <div class="content">
        <img src="lost.gif" alt="gif">
        <h2>Game Over!</h2>
        <p> The correct word was: <b id="correct-word">placeholder</b></p>
        <button class="play-again">Play Again</button>
      </div>
    </div>

    <div class="container game-container mt-5">
      <!-- TOP BAR -->
      <div class="row align-items-center mb-3">
        <div class="col-12 col-md-6">
          <h1>Hangman Game</h1>
        </div>
        <div class="col-12 col-md-6">
          <div class="row g-2 justify-content-md-end">
            <div class="col-auto">
              <a href="index.html">
                <button class="icon-btn">🔄 Restart</button>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- LIVES -->
      <div class="lives" id="lives">
        <!-- JS will update lives here -->
      </div>

      <div class="row g-4">
        <!-- HANGMAN AREA -->
        <div class="col-12 col-md-4 text-center">
          <div class="row g-3">
            <div class="col-12">
              <div class="hangman-box">
                <img src="hangman-0.svg" alt="hangman-img" />
              </div>
            </div>

            <div class="col-12 text-center">
              <button class="hint-btn" id="hint-btn">💡 Hint</button>
            </div>
          </div>
        </div>

        <!-- GAME AREA -->
        <div class="col-12 col-md-8">
          <div class="hint text-center" id="hint-element">
            Hint: The category is <span id="category-name"></span>
          </div>

          <div class="word row row-cols-auto g-3 justify-content-center">
            <span id="word"></span>
          </div>

          <!-- KEYBOARD -->
          <div class="keyboard">
            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col">
                <button class="key" onclick="pressLetter('A', this)">A</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('B', this)">B</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('C', this)">C</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('D', this)">D</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('E', this)">E</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('F', this)">F</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('G', this)">G</button>
              </div>
            </div>

            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col">
                <button class="key" onclick="pressLetter('H', this)">H</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('I', this)">I</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('J', this)">J</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('K', this)">K</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('L', this)">L</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('M', this)">M</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('N', this)">N</button>
              </div>
            </div>

            <div class="row g-2 mb-2 keyboard-row">
              <div class="col key-col">
                <button class="key" onclick="pressLetter('O', this)">O</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('P', this)">P</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('Q', this)">Q</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('R', this)">R</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('S', this)">S</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('T', this)">T</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('U', this)">U</button>
              </div>
            </div>

            <div class="row g-2 keyboard-row justify-content-center">
              <div class="col key-col">
                <button class="key" onclick="pressLetter('V', this)">V</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('W', this)">W</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('X', this)">X</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('Y', this)">Y</button>
              </div>
              <div class="col key-col">
                <button class="key" onclick="pressLetter('Z', this)">Z</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="scripts.js"></script>
  </body>
</html>
