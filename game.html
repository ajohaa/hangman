<!doctype html>
<html lang="en">
  <head>
    <title>hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="game-container">
      <!-- TOP BAR -->
      <div class="top-bar">
        <h1>Hangman Game</h1>

        <div class="top-icons">
          <a href="index.html">
          <button class="icon-btn">🏠 Home </button>
          </a>
          <button class="icon-btn" id="restart-btn">🔄 Restart</button>
        </div>
      </div>

      <!-- LIVES -->
      <div class="lives" id="lives">
        Lives:
      </div>

      <div class="main-area">
        <!-- HANGMAN AREA -->
        <div class="hangman-area">
          <div class="hangman-box">
            <!-- JS will draw hangman here -->
          </div>

          <button class="hint-btn">💡 Hint</button>
        </div>

        <!-- GAME AREA -->
        <div class="game-area">
          <div class="category">
            Category: <span id="category-name">Animals</span>
          </div>

          <div class="word" id="word">
            <!-- JS will display the word here -->
          </div>

          <!-- KEYBOARD -->
          <div class="keyboard">
            <!-- Row 1 -->
            <button class="key">A</button>
            <button class="key">B</button>
            <button class="key">C</button>
            <button class="key">D</button>
            <button class="key">E</button>
            <button class="key">F</button>
            <button class="key">G</button>

            <!-- Row 2 -->
            <button class="key">H</button>
            <button class="key">I</button>
            <button class="key">J</button>
            <button class="key">K</button>
            <button class="key">L</button>
            <button class="key">M</button>
            <button class="key">N</button>

            <!-- Row 3 -->
            <button class="key">O</button>
            <button class="key">P</button>
            <button class="key">Q</button>
            <button class="key">R</button>
            <button class="key">S</button>
            <button class="key">T</button>
            <button class="key">U</button>

            <!-- Row 4 -->
            <button class="key">V</button>
            <button class="key">W</button>
            <button class="key">X</button>
            <button class="key">Y</button>
            <button class="key">Z</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="scripts.js"></script>
  </body>
</html>
