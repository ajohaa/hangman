<!doctype html>
<html lang="en">
  <head>
    <title>hangman</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

<body>
<div class="container text-center mt-5">

<!-- Title -->
<h1 class="mb-4">Hangman Game</h1>

<div class="row align-items-center">

<!-- Hangman Display -->
<div class="col-md-6">
<div class="hangman-box d-flex justify-content-center align-items-center">

<div class="gallows">
<div class="beam"></div>
<div class="rope"></div>

<div class="stick-figure">
<div class="head"></div>
<div class="body"></div>
<div class="arm left"></div>
<div class="arm right"></div>
<div class="leg left"></div>
<div class="leg right"></div>
</div>
</div>

</div>
</div>

<!-- Difficulty Buttons -->
<div class="col-md-6">
<div class="d-grid gap-3">
<a href="game.html">
            <button class="btn btn-success w-100" id="easy">easy</button>
          </a>
          <a href="game.html">
            <button class="btn btn-warning w-100" id="medium">medium</button>
          </a>
          <a href="game.html">
            <button class="btn btn-danger w-100" id="hard">hard</button>
          </a>
</div>
</div>

</div>

<!-- Tutorial Button -->
<div class="mt-4">
  <a href="tutorial.html">
<button class="btn btn-secondary">Tutorial</button>
</a>
</div>

</div>


<!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="scripts.js"></script>
  </body>
</html>
